<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XML Attachment Converter</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18222f;
        --muted: #667385;
        --line: #d7dee8;
        --panel: #ffffff;
        --page: #eef3f7;
        --blue: #1167b1;
        --blue-dark: #0b4c86;
        --green: #1a7f52;
        --orange: #c25a17;
        --red: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family:
          Arial,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        min-height: 100vh;
        padding: 28px;
      }

      .shell {
        max-width: 1120px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 6px 12px;
        border: 1px solid #b9d8c8;
        border-radius: 999px;
        background: #f1fbf5;
        color: #155f3e;
        font-size: 13px;
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
      }

      .drop-zone {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 250px;
        border: 2px dashed #9fb2c7;
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(17, 103, 177, 0.05), rgba(26, 127, 82, 0.04)),
          var(--panel);
        outline: none;
        transition:
          border-color 0.15s ease,
          background-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .drop-zone.dragging,
      .drop-zone:focus-visible {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(17, 103, 177, 0.16);
      }

      .drop-inner {
        display: grid;
        justify-items: center;
        gap: 16px;
        padding: 32px;
        text-align: center;
      }

      .file-icon {
        width: 70px;
        height: 88px;
        filter: drop-shadow(0 8px 14px rgba(24, 34, 47, 0.15));
      }

      .drop-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .drop-meta {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 18px 0 12px;
      }

      .summary {
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.icon-text {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 13px;
      }

      button.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--blue-dark);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      button:not(:disabled):hover {
        border-color: #a6b5c7;
      }

      .panel {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        font-size: 14px;
      }

      th {
        background: #f7f9fb;
        color: #4a5666;
        font-size: 12px;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .name-col {
        width: 42%;
      }

      .type-col {
        width: 22%;
      }

      .size-col {
        width: 14%;
      }

      .action-col {
        width: 22%;
        text-align: right;
      }

      .file-name {
        overflow-wrap: anywhere;
        font-weight: 700;
      }

      .muted {
        color: var(--muted);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 160px;
        color: var(--muted);
        font-size: 14px;
      }

      .message {
        min-height: 22px;
        margin-top: 12px;
        font-size: 14px;
      }

      .message.error {
        color: var(--red);
      }

      .message.ok {
        color: var(--green);
      }

      .message.warn {
        color: var(--orange);
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      svg {
        flex: 0 0 auto;
      }

      @media (max-width: 760px) {
        main {
          padding: 18px;
        }

        header,
        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          justify-content: stretch;
        }

        button.icon-text {
          justify-content: center;
          width: 100%;
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border-bottom: 1px solid var(--line);
        }

        tr:last-child {
          border-bottom: 0;
        }

        td {
          display: grid;
          grid-template-columns: 92px 1fr;
          width: 100% !important;
          border-bottom: 0;
          padding: 9px 14px;
        }

        td::before {
          color: var(--muted);
          content: attr(data-label);
          font-size: 12px;
          font-weight: 700;
          text-transform: uppercase;
        }

        .action-col {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <header>
          <h1>XML Attachment Converter</h1>
          <div class="status-pill"><span class="dot"></span><span>Browser lokal</span></div>
        </header>

        <section class="drop-zone" id="dropZone" tabindex="0" aria-label="XML-Datei auswählen">
          <input id="fileInput" type="file" accept=".xml,text/xml,application/xml" />
          <div class="drop-inner">
            <svg class="file-icon" viewBox="0 0 84 104" role="img" aria-label="XML">
              <path d="M18 2h34l30 30v66a4 4 0 0 1-4 4H18a4 4 0 0 1-4-4V6a4 4 0 0 1 4-4Z" fill="#ffffff" stroke="#9fb2c7" stroke-width="2" />
              <path d="M52 3v28a4 4 0 0 0 4 4h25" fill="#d8eef4" stroke="#9fb2c7" stroke-width="2" />
              <path d="M28 58 18 68l10 10M56 58l10 10-10 10M47 52 37 84" fill="none" stroke="#1167b1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <div>
              <p class="drop-title">XML ablegen oder auswählen</p>
              <p class="drop-meta" id="fileMeta">Keine Datei geladen</p>
            </div>
          </div>
        </section>

        <div class="toolbar">
          <div class="summary" id="summary">0 Attachments</div>
          <div class="actions">
            <button class="icon-text" id="clearButton" disabled>
              <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              Leeren
            </button>
            <button class="icon-text primary" id="zipButton" disabled>
              <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 20h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              ZIP herunterladen
            </button>
          </div>
        </div>

        <section class="panel" aria-live="polite">
          <div class="empty" id="emptyState">Noch keine Attachments gefunden</div>
          <table id="attachmentTable" hidden>
            <thead>
              <tr>
                <th class="name-col">Dateiname</th>
                <th class="type-col">Medientyp</th>
                <th class="size-col">Größe</th>
                <th class="action-col">Aktion</th>
              </tr>
            </thead>
            <tbody id="attachmentBody"></tbody>
          </table>
        </section>

        <div class="message" id="message" role="status"></div>
      </div>
    </main>

    <script>
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");
      const fileMeta = document.getElementById("fileMeta");
      const summary = document.getElementById("summary");
      const message = document.getElementById("message");
      const table = document.getElementById("attachmentTable");
      const tbody = document.getElementById("attachmentBody");
      const emptyState = document.getElementById("emptyState");
      const zipButton = document.getElementById("zipButton");
      const clearButton = document.getElementById("clearButton");

      let attachments = [];

      const crcTable = (() => {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let c = i;
          for (let j = 0; j < 8; j += 1) {
            c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          }
          table[i] = c >>> 0;
        }
        return table;
      })();

      function setMessage(text, type = "") {
        message.className = `message ${type}`.trim();
        message.textContent = text;
      }

      function sanitizeFileName(name, fallback) {
        const cleaned = String(name || "")
          .replace(/[<>:"/\\|?*\u0000-\u001f]/g, "_")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/^\.+$/, "");
        return cleaned || fallback;
      }

      function extFromMime(mime) {
        const map = {
          "application/pdf": "pdf",
          "image/jpeg": "jpg",
          "image/png": "png",
          "image/gif": "gif",
          "text/plain": "txt",
          "text/xml": "xml",
          "application/xml": "xml",
          "application/zip": "zip",
        };
        return map[String(mime || "").toLowerCase()] || "bin";
      }

      function localName(node) {
        return node.localName || node.nodeName.split(":").pop();
      }

      function firstChildText(parent, names) {
        const wanted = new Set(names.map((name) => name.toLowerCase()));
        for (const child of Array.from(parent.children || [])) {
          if (wanted.has(localName(child).toLowerCase())) {
            return (child.textContent || "").trim();
          }
        }
        return "";
      }

      function detectEncoding(buffer) {
        const probe = new TextDecoder("windows-1252").decode(buffer.slice(0, 256));
        const match = /<\?xml[^>]*encoding=["']([^"']+)["']/i.exec(probe);
        return match ? match[1].trim() : "utf-8";
      }

      function decodeXml(buffer) {
        const encoding = detectEncoding(buffer);
        try {
          return new TextDecoder(encoding).decode(buffer);
        } catch {
          return new TextDecoder("utf-8").decode(buffer);
        }
      }

      function decodeBase64(base64) {
        const normalized = base64.replace(/\s+/g, "");
        const binary = atob(normalized);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }

      function isLikelyBase64(text) {
        const value = text.replace(/\s+/g, "");
        return value.length >= 80 && value.length % 4 === 0 && /^[A-Za-z0-9+/]+={0,2}$/.test(value);
      }

      function extractAttachments(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "application/xml");
        const parseError = xml.querySelector("parsererror");
        if (parseError) {
          throw new Error("XML konnte nicht gelesen werden.");
        }

        const found = [];
        const attachmentNodes = Array.from(xml.getElementsByTagName("*")).filter(
          (node) => localName(node).toLowerCase() === "dokumentanlage"
        );

        attachmentNodes.forEach((node, index) => {
          const parent = node.parentElement || node;
          const raw = node.textContent || "";
          if (!isLikelyBase64(raw)) return;

          const mediaType = firstChildText(parent, ["MedienArt", "MimeType", "ContentType"]) || "application/octet-stream";
          const extension = extFromMime(mediaType);
          const fileName = sanitizeFileName(
            firstChildText(parent, ["DateiName", "Filename", "FileName", "Name"]),
            `attachment-${String(index + 1).padStart(2, "0")}.${extension}`
          );

          found.push({
            fileName,
            mediaType,
            bytes: decodeBase64(raw),
          });
        });

        return found;
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function downloadBytes(bytes, fileName, type = "application/octet-stream") {
        const blob = new Blob([bytes], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (const byte of bytes) {
          crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function dosDateTime(date) {
        const year = Math.max(1980, date.getFullYear());
        const dosTime = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
        const dosDate = ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
        return { dosDate, dosTime };
      }

      function writeUint16(target, offset, value) {
        target[offset] = value & 0xff;
        target[offset + 1] = (value >>> 8) & 0xff;
      }

      function writeUint32(target, offset, value) {
        target[offset] = value & 0xff;
        target[offset + 1] = (value >>> 8) & 0xff;
        target[offset + 2] = (value >>> 16) & 0xff;
        target[offset + 3] = (value >>> 24) & 0xff;
      }

      function makeZip(files) {
        const encoder = new TextEncoder();
        const now = dosDateTime(new Date());
        const chunks = [];
        const central = [];
        let offset = 0;

        files.forEach((file) => {
          const nameBytes = encoder.encode(file.fileName);
          const data = file.bytes;
          const crc = crc32(data);

          const local = new Uint8Array(30 + nameBytes.length);
          writeUint32(local, 0, 0x04034b50);
          writeUint16(local, 4, 20);
          writeUint16(local, 6, 2048);
          writeUint16(local, 8, 0);
          writeUint16(local, 10, now.dosTime);
          writeUint16(local, 12, now.dosDate);
          writeUint32(local, 14, crc);
          writeUint32(local, 18, data.length);
          writeUint32(local, 22, data.length);
          writeUint16(local, 26, nameBytes.length);
          local.set(nameBytes, 30);
          chunks.push(local, data);

          const centralHeader = new Uint8Array(46 + nameBytes.length);
          writeUint32(centralHeader, 0, 0x02014b50);
          writeUint16(centralHeader, 4, 20);
          writeUint16(centralHeader, 6, 20);
          writeUint16(centralHeader, 8, 2048);
          writeUint16(centralHeader, 10, 0);
          writeUint16(centralHeader, 12, now.dosTime);
          writeUint16(centralHeader, 14, now.dosDate);
          writeUint32(centralHeader, 16, crc);
          writeUint32(centralHeader, 20, data.length);
          writeUint32(centralHeader, 24, data.length);
          writeUint16(centralHeader, 28, nameBytes.length);
          writeUint32(centralHeader, 42, offset);
          centralHeader.set(nameBytes, 46);
          central.push(centralHeader);

          offset += local.length + data.length;
        });

        const centralSize = central.reduce((sum, item) => sum + item.length, 0);
        const end = new Uint8Array(22);
        writeUint32(end, 0, 0x06054b50);
        writeUint16(end, 8, files.length);
        writeUint16(end, 10, files.length);
        writeUint32(end, 12, centralSize);
        writeUint32(end, 16, offset);

        const totalSize = offset + centralSize + end.length;
        const zip = new Uint8Array(totalSize);
        let cursor = 0;
        [...chunks, ...central, end].forEach((chunk) => {
          zip.set(chunk, cursor);
          cursor += chunk.length;
        });
        return zip;
      }

      function render() {
        tbody.innerHTML = "";
        summary.textContent = `${attachments.length} Attachment${attachments.length === 1 ? "" : "s"}`;
        zipButton.disabled = attachments.length === 0;
        clearButton.disabled = attachments.length === 0;
        table.hidden = attachments.length === 0;
        emptyState.hidden = attachments.length !== 0;

        attachments.forEach((attachment, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="name-col" data-label="Dateiname"><span class="file-name"></span></td>
            <td class="type-col muted" data-label="Medientyp"></td>
            <td class="size-col muted" data-label="Größe"></td>
            <td class="action-col" data-label="Aktion"></td>
          `;
          row.querySelector(".file-name").textContent = attachment.fileName;
          row.children[1].textContent = attachment.mediaType;
          row.children[2].textContent = formatBytes(attachment.bytes.length);
          const button = document.createElement("button");
          button.className = "icon-text";
          button.type = "button";
          button.innerHTML = `
            <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 20h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Datei
          `;
          button.addEventListener("click", () => {
            downloadBytes(attachment.bytes, attachment.fileName, attachment.mediaType);
          });
          row.children[3].appendChild(button);
          tbody.appendChild(row);
        });
      }

      async function handleFile(file) {
        if (!file) return;
        fileMeta.textContent = `${file.name} · ${formatBytes(file.size)}`;
        setMessage("");

        try {
          const buffer = await file.arrayBuffer();
          const xmlText = decodeXml(buffer);
          attachments = extractAttachments(xmlText);
          render();
          if (attachments.length === 0) {
            setMessage("Keine dekodierbaren DokumentAnlage-Elemente gefunden.", "warn");
          } else {
            setMessage(`${attachments.length} Attachment${attachments.length === 1 ? "" : "s"} bereit.`, "ok");
          }
        } catch (error) {
          attachments = [];
          render();
          setMessage(error.message || "Datei konnte nicht verarbeitet werden.", "error");
        }
      }

      fileInput.addEventListener("change", (event) => handleFile(event.target.files[0]));

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropZone.classList.add("dragging");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropZone.classList.remove("dragging");
        });
      });

      dropZone.addEventListener("drop", (event) => {
        handleFile(event.dataTransfer.files[0]);
      });

      dropZone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          fileInput.click();
        }
      });

      zipButton.addEventListener("click", () => {
        if (!attachments.length) return;
        const zip = makeZip(attachments);
        downloadBytes(zip, "attachments.zip", "application/zip");
      });

      clearButton.addEventListener("click", () => {
        attachments = [];
        fileInput.value = "";
        fileMeta.textContent = "Keine Datei geladen";
        setMessage("");
        render();
      });

      render();
    </script>
  </body>
</html>
